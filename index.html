<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Penis Clicker </title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    overflow-x:hidden;
    transition:0.3s;
}

h1{
    margin-top:20px;
    font-size:48px;
}

#score{
    font-size:42px;
    margin:15px;
    font-weight:bold;
}

#clickPowerText{
    font-size:20px;
    margin-bottom:10px;
}

#rebirthText{
    font-size:18px;
    margin-bottom:15px;
    opacity:0.8;
}

#jah{
    width:350px;
    max-width:80vw;
    cursor:pointer;
    transition:transform .08s;
    user-select:none;
}

#jah:active{
    transform:scale(0.95);
}

.shop{
    max-width:500px;
    margin:30px auto;
}

button{
    width:100%;
    padding:15px;
    margin:8px 0;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:10px;
}

.effect{
    position:absolute;
    width:100px;
    pointer-events:none;
    animation:floatUp 1s linear forwards;
}

.floatingText{
    position:absolute;
    color:white;
    font-weight:bold;
    pointer-events:none;
    animation:floatUp 1s linear forwards;
}

@keyframes floatUp{
    from{opacity:1; transform:translateY(0) scale(1);}
    to{opacity:0; transform:translateY(-100px) scale(1.3);}
}
</style>
</head>

<body>

<h1>PENIS CLICKER</h1>

<div id="score">0 PP</div>
<div id="clickPowerText">Click Power: 1</div>
<div id="rebirthText">Rebirths: 0</div>

<img src="jah.avif" id="jah" draggable="false">

<div class="shop">

    <button onclick="buyUpgrade()">
        💪 Bigger Clicks (+1 PP)
        <br>Cost: <span id="upgradeCost">25</span> PP
    </button>

    <button onclick="buyAutoClicker()">
        🤖 Auto Wiener (+1 PP/sec)
        <br>Cost: <span id="autoCost">100</span> PP
    </button>

    <button onclick="rebirth()">
        🔁 Rebirth (reset for boost)
        <br>Cost: 5000 PP
    </button>

</div>

<script>

let pp = 0;
let clickPower = 1;
let autoPower = 0;
let rebirths = 0;

let upgradeCost = 25;
let autoCost = 100;

const jah = document.getElementById("jah");
const score = document.getElementById("score");

const images = ["jah.avif","123.jpg","1234.jpg","12345.png"];
const bgImages = ["1234.jpg","12345.png"];

const messages = ["OvR","blyatttt","hej med dig","BUSSSSS.. BUSSSSS"];

// CLICK
jah.addEventListener("click",(e)=>{

    pp += clickPower;

    // image swap
    if(Math.random() < 0.25){
        jah.src = images[Math.floor(Math.random()*images.length)];
    }

    // background swap (FIXED)
    if(Math.random() < 0.15){
        let bg = bgImages[Math.floor(Math.random()*bgImages.length)];
        document.body.style.backgroundImage = "url('" + bg + "')";
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundPosition = "center";
    }

    // effect image
    const splash = document.createElement("img");
    splash.src = "123.jpg";
    splash.className = "effect";
    splash.style.left = (e.pageX - 50) + "px";
    splash.style.top = (e.pageY - 50) + "px";
    document.body.appendChild(splash);
    setTimeout(()=>splash.remove(),1000);

    // floating text
    const txt = document.createElement("div");
    txt.className = "floatingText";
    txt.textContent = messages[Math.floor(Math.random()*messages.length)];
    txt.style.left = e.pageX + "px";
    txt.style.top = e.pageY + "px";
    document.body.appendChild(txt);
    setTimeout(()=>txt.remove(),1000);

    updateUI();
});

// UPGRADES
function buyUpgrade(){
    if(pp >= upgradeCost){
        pp -= upgradeCost;
        clickPower++;
        upgradeCost = Math.floor(upgradeCost * 1.6);
        updateUI();
    }
}

function buyAutoClicker(){
    if(pp >= autoCost){
        pp -= autoCost;
        autoPower++;
        autoCost = Math.floor(autoCost * 1.8);
        updateUI();
    }
}

// REBIRTH
function rebirth(){
    if(pp >= 5000){
        rebirths++;
        pp = 0;
        clickPower = 1 + rebirths * 2;
        autoPower = 0;

        upgradeCost = 25;
        autoCost = 100;

        updateUI();
    }
}

// AUTO
setInterval(()=>{
    pp += autoPower;
    updateUI();
},1000);

// UI
function updateUI(){
    score.textContent = Math.floor(pp) + " PP";
    document.getElementById("clickPowerText").textContent =
        "Click Power: " + clickPower;

    document.getElementById("rebirthText").textContent =
        "Rebirths: " + rebirths;

    document.getElementById("upgradeCost").textContent = upgradeCost;
    document.getElementById("autoCost").textContent = autoCost;

    saveGame();
}

// SAVE
function saveGame(){
    localStorage.setItem("penisClickerSave",JSON.stringify({
        pp,
        clickPower,
        autoPower,
        upgradeCost,
        autoCost,
        rebirths
    }));
}

// LOAD
function loadGame(){
    const save = JSON.parse(localStorage.getItem("penisClickerSave"));
    if(save){
        pp = save.pp || 0;
        clickPower = save.clickPower || 1;
        autoPower = save.autoPower || 0;
        upgradeCost = save.upgradeCost || 25;
        autoCost = save.autoCost || 100;
        rebirths = save.rebirths || 0;
    }
    updateUI();
}

loadGame();

</script>

</body>
</html>
