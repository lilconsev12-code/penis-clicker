<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clicker Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    display:flex;
    height:100vh;
    overflow:hidden;
}

#main{
    flex:1;
    text-align:center;
    padding:20px;
    overflow:auto;
}

#side{
    width:320px;
    background:#1c1c1c;
    padding:15px;
    overflow:auto;
    border-left:2px solid #333;
}

h1{ font-size:40px; }

#score{
    font-size:40px;
    margin:10px;
}

#jah{
    width:280px;
    cursor:pointer;
    transition:0.1s;
}

#jah:active{ transform:scale(0.95); }

.upgrade{
    background:#2a2a2a;
    margin:5px 0;
    padding:10px;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    cursor:pointer;
    border:none;
    margin-top:5px;
    border-radius:6px;
}

.rebirthBox{
    background:#2a2a2a;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

.effect{
    position:absolute;
    width:80px;
    pointer-events:none;
    animation:float 1s forwards;
}

@keyframes float{
    from{opacity:1; transform:translateY(0);}
    to{opacity:0; transform:translateY(-120px);}
}
</style>
</head>

<body>

<div id="main">
    <h1>Clicker Game</h1>

    <div id="score">0</div>
    <div id="pps">0 / sec</div>

    <img src="assets/jah.avif" id="jah">

    <div id="upgrades"></div>
</div>

<div id="side">

    <div class="rebirthBox">
        <h2>Rebirth System</h2>
        <p>Level: <span id="prestige">0</span></p>
        <button onclick="rebirth()">REBIRTH</button>
    </div>

</div>

<script>

let pp = 0;
let clickPower = 1;
let autoPower = 0;
let prestige = 0;

let username = null;

// upgrade names
const names = [
"Finger Training","Grip Boost","Wrist Warmup","Speed Tap","Neon Click",
"Auto Bot","Factory Core","Quantum Tap","Hyper Grip","God Fingers",
"Machine Hands","Cyber Click","Infinity Tap","Void Engine","Star Factory",
"Galaxy Tap","Alpha Grip","Omega Click","Titan Fingers","Final Form"
];

const upgrades = [];

for(let i=0;i<100;i++){

    upgrades.push({
        name: names[i % names.length] + " MK-" + (Math.floor(i/10)+1),
        cost: Math.floor(10 * Math.pow(1.15,i)),
        type: i % 2 ? "auto" : "click",
        value: Math.floor(i/8)+1
    });

}

const owned = Array(100).fill(0);

const score = document.getElementById("score");
const pps = document.getElementById("pps");
const upgDiv = document.getElementById("upgrades");

function render(){

    upgDiv.innerHTML = "";

    upgrades.forEach((u,i)=>{

        const d = document.createElement("div");
        d.className = "upgrade";

        d.innerHTML = `
            <b>${u.name}</b><br>
            Cost: ${u.cost}<br>
            Owned: ${owned[i]}<br>
            +${u.value} ${u.type}<br>
            <button onclick="buy(${i})">Buy</button>
        `;

        upgDiv.appendChild(d);

    });

}

function buy(i){

    let u = upgrades[i];

    if(pp >= u.cost){

        pp -= u.cost;
        owned[i]++;

        if(u.type === "click") clickPower += u.value;
        else autoPower += u.value;

        u.cost = Math.floor(u.cost * 1.15);

        update();
        render();
    }

}

document.getElementById("jah").onclick = (e)=>{

    pp += clickPower;

    const img = document.createElement("img");
    img.src = "assets/123.jpg";
    img.className = "effect";

    img.style.left = e.pageX+"px";
    img.style.top = e.pageY+"px";

    document.body.appendChild(img);

    setTimeout(()=>img.remove(),1000);

    update();
};

function rebirth(){

    if(pp >= 10000){

        prestige++;

        pp = 0;
        clickPower = 1 + prestige;
        autoPower = 0;

        for(let i=0;i<100;i++){
            upgrades[i].cost = Math.floor(10 * Math.pow(1.15,i));
            owned[i]=0;
        }

        update();
        render();

    }

}

setInterval(()=>{

    pp += autoPower;
    update();

},1000);

function update(){

    score.innerText = Math.floor(pp);
    pps.innerText = autoPower + " / sec";
    document.getElementById("prestige").innerText = prestige;

}

render();
update();

</script>

</body>
</html>
